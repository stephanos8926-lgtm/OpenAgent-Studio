# Core Boot Parameters Configuration for SuperOS
INIT_RUNLEVEL=3
VIRTUAL_CPU_CORES=2
VIRTUAL_MEM_LIMIT=128MB
SECURE_MODE=true
DB_STORAGE_PATH=/.super/data/system_state.db
VIRTUAL_DISK_IMAGE=/.super/data/fs_snapshot.json
PERSISTENCE_INTERVAL_SEC=15
SERIALIZATION_FORMAT=ZIP_SNAPSHOT
LOG_LEVEL=INFO
HOST_SYNC_DELAY=500
